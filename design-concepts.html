    <style>
      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --surface-hover: #222633;
        --border: rgba(255, 255, 255, 0.08);
        --text: #e8eaef;
        --muted: #8b92a8;
        --accent: #6c9eff;
        --accent-glow: rgba(108, 158, 255, 0.25);
        --selected: #4ade80;
        --selected-glow: rgba(74, 222, 128, 0.2);
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Assistant", "Rubik", sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.65;
        min-height: 100vh;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 50% at 20% -10%, rgba(108, 158, 255, 0.12), transparent),
          radial-gradient(ellipse 60% 40% at 90% 100%, rgba(168, 85, 247, 0.08), transparent);
        pointer-events: none;
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 1;
        max-width: 1200px;
        margin: 0 auto;
        padding: 2.5rem 1.5rem 5rem;
      }

      header.hero {
        text-align: center;
        margin-bottom: 3rem;
      }

      .badge {
        display: inline-block;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--accent);
        background: var(--accent-glow);
        border: 1px solid rgba(108, 158, 255, 0.3);
        padding: 0.35rem 0.85rem;
        border-radius: 999px;
        margin-bottom: 1rem;
      }

      h1 {
        font-size: clamp(1.75rem, 4vw, 2.75rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 0.75rem;
      }

      .subtitle {
        color: var(--muted);
        font-size: 1.05rem;
        max-width: 640px;
        margin: 0 auto 1.5rem;
      }

      .selection-bar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(15, 17, 23, 0.85);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        padding: 0.85rem 1.5rem;
        margin: 0 -1.5rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .selection-info {
        font-size: 0.95rem;
        color: var(--muted);
      }

      .selection-info strong {
        color: var(--selected);
      }

      #copy-btn {
        font-family: inherit;
        font-size: 0.9rem;
        font-weight: 600;
        padding: 0.55rem 1.25rem;
        border-radius: 10px;
        border: 1px solid rgba(74, 222, 128, 0.4);
        background: var(--selected-glow);
        color: var(--selected);
        cursor: pointer;
        transition: transform 0.15s, opacity 0.15s;
      }

      #copy-btn:hover {
        transform: translateY(-1px);
      }

      #copy-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap: 1.25rem;
      }

      .concept {
        position: relative;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.35rem 1.35rem 1.15rem;
        cursor: pointer;
        transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
        user-select: none;
      }

      .concept:hover {
        border-color: rgba(255, 255, 255, 0.15);
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      .concept.is-selected {
        border-color: var(--selected);
        box-shadow: 0 0 0 1px var(--selected), 0 8px 32px var(--selected-glow);
      }

      .concept-open-hint {
        position: absolute;
        bottom: 1rem;
        left: 1rem;
        font-size: 0.68rem;
        color: var(--muted);
        opacity: 0;
        transition: opacity 0.2s;
      }

      .concept:hover .concept-open-hint {
        opacity: 1;
      }

      .concept-header {
        display: flex;
        align-items: flex-start;
        gap: 0.85rem;
        margin-bottom: 0.75rem;
      }

      .concept-num {
        flex-shrink: 0;
        width: 2.25rem;
        height: 2.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.85rem;
        font-weight: 700;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--muted);
      }

      .concept.is-selected .concept-num {
        background: var(--selected-glow);
        color: var(--selected);
      }

      .concept-title {
        font-size: 1.1rem;
        font-weight: 700;
        line-height: 1.35;
      }

      .concept-style {
        display: inline-block;
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--accent);
        margin-top: 0.25rem;
      }

      .concept-desc {
        font-size: 0.92rem;
        color: var(--muted);
        margin-bottom: 0.85rem;
      }

      .concept-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }

      .tag {
        font-size: 0.7rem;
        font-weight: 500;
        padding: 0.2rem 0.55rem;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--muted);
        border: 1px solid var(--border);
      }

      .concept-preview {
        height: 4px;
        border-radius: 999px;
        margin-top: 1rem;
        opacity: 0.85;
      }

      .preview-1 { background: linear-gradient(90deg, #c4a574, #2d5016, #4a90d9, #e8dcc8); }
      .preview-2 { background: linear-gradient(90deg, #fff, #000, #fff); }
      .preview-3 { background: linear-gradient(90deg, #ff6b35, #f7c59f, #2ec4b6, #011627); }

      .preview-16 { background: linear-gradient(90deg, #e8f4f8, #b8d4e3, #5a9ab8, #2c5f7a); }

      .preview-18 { background: linear-gradient(90deg, #2d1b00, #5c3d1e, #a67c52, #f5deb3); }

      .check-mark {
        position: absolute;
        top: 1rem;
        left: 1rem;
        width: 1.5rem;
        height: 1.5rem;
        border-radius: 50%;
        border: 2px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        opacity: 0;
        transition: opacity 0.2s, background 0.2s, border-color 0.2s;
      }

      .concept.is-selected .check-mark {
        opacity: 1;
        background: var(--selected);
        border-color: var(--selected);
        color: #0f1117;
      }

      footer.note {
        text-align: center;
        margin-top: 3rem;
        padding-top: 2rem;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 0.9rem;
      }

      @media (max-width: 480px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

function hexPoints(cx, cy, r) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 180) * (60 * i - 30);
    pts.push(`${cx + r * Math.cos(angle)},${cy + r * Math.sin(angle)}`);
  }
  return pts.join(" ");
}

function buildBoardSvg(theme) {
  const r = 28;
  const w = 72;
  const h = 62;
  let idx = 0;
  let svg = "";
  const startY = 55;
  const startX = 200;

  HEX_ROWS.forEach((count, row) => {
    const offsetX = startX + ((5 - count) * w) / 2;
    for (let col = 0; col < count; col++) {
      const cx = offsetX + col * w + (row % 2 === 0 ? 0 : w / 2);
      const cy = startY + row * h;
      const resource = HEX_RESOURCES[idx];
      let fill = RESOURCE_COLORS[resource];
      if (theme.desaturate) fill = fill;

      const stroke = theme.hexStroke || "#333";
      const sw = theme.hexStrokeWidth || 1.5;
      const num = HEX_NUMBERS[idx];
      const isDesert = resource === "desert";

      let filter = "";
      if (theme.neon) filter = ' filter="url(#neonGlow)"';
      if (theme.gold) filter = ' filter="url(#goldGlow)"';

      svg += `<polygon points="${hexPoints(cx, cy, r)}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"${filter}/>`;
      if (num !== null) {
        const fc = theme.text || "#111";
        svg += `<circle cx="${cx}" cy="${cy}" r="14" fill="${theme.surface || "#fff"}" stroke="${stroke}" stroke-width="1"/>`;
        svg += `<text x="${cx}" y="${cy + 4}" text-anchor="middle" font-size="11" font-weight="700" fill="${fc}" font-family="${theme.font}">${num}</text>`;
      } else if (isDesert) {
        svg += `<text x="${cx}" y="${cy + 4}" text-anchor="middle" font-size="14" fill="${theme.muted}">🏜</text>`;
      }
      idx++;
    }
  });

  return svg;
}

      const { concepts, renderPreviewDocument } = window.DesignPreview;

      let selectedIndex = null;
      const grid = document.getElementById("concepts-grid");
      const selectionInfo = document.getElementById("selection-info");
      const copyBtn = document.getElementById("copy-btn");

      function openPreview(num) {
        const html = renderPreviewDocument(num);
        const blob = new Blob([html], { type: "text/html;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const win = window.open(url, "_blank", "width=1280,height=860,noopener,noreferrer");
        if (!win) {
          alert("לא ניתן לפתוח חלון חדש — בדוק שהדפדפן לא חוסם pop-ups.");
          URL.revokeObjectURL(url);
          return;
        }
        win.addEventListener("load", () => URL.revokeObjectURL(url));
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      }

      concepts.forEach((c, i) => {
        const num = i + 1;
        const card = document.createElement("article");
        card.className = "concept";
        card.dataset.index = num;
        card.innerHTML = `
          <span class="check-mark">✓</span>
          <div class="concept-header">
            <span class="concept-num">${num}</span>
            <div>
              <h2 class="concept-title">${c.title}</h2>
              <span class="concept-style">${c.style}</span>
            </div>
          </div>
          <p class="concept-desc">${c.desc}</p>
          <div class="concept-tags">
            ${c.tags.map((t) => `<span class="tag">${t}</span>`).join("")}
          </div>
          <div class="concept-preview preview-${num}"></div>
          <span class="concept-open-hint">↗ תצוגה מקדימה</span>
        `;
        card.addEventListener("click", () => {
          selectConcept(num, card);
          openPreview(num);
        });
        grid.appendChild(card);
      });

      function selectConcept(num, card) {
        document.querySelectorAll(".concept.is-selected").forEach((el) => {
          el.classList.remove("is-selected");
        });
        card.classList.add("is-selected");
        selectedIndex = num;
        const c = concepts[num - 1];
        selectionInfo.innerHTML = `נבחר: <strong>#${num} — ${c.title}</strong> (${c.style})`;
        copyBtn.disabled = false;
      }

      copyBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        if (selectedIndex === null) return;
        const c = concepts[selectedIndex - 1];
        const text = `#${selectedIndex} — ${c.title} (${c.style})\n${c.desc}`;
        navigator.clipboard.writeText(text).then(() => {
          copyBtn.textContent = "הועתק ✓";
          setTimeout(() => {
            copyBtn.textContent = "העתק בחירה";
          }, 2000);
        });
      });
    </script>
  </body>
</html>
